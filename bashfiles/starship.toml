format = '[ $user ]($style)'

[directory]
style = "bg:directory_bg fg:text_fg"
format = "[ $path ]($style)[$read_only]($read_only_style)"
truncation_length = 999
truncate_to_repo = false

read_only = "ŅÖ▓ "
read_only_style = "bg:directory_bg fg:text_fg"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
