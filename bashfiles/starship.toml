detect_files = []
detect_folders = []

[git_branch]
symbol = "’äō "
style = "bg:git_bg fg:text_fg"
format = '[ $symbol$branch ]($style)'

[git_status]
style = "bg:git_bg fg:text_fg"
format = '[$all_status$ahead_behind ]($style)'

ahead = '\[Ōåæ${count}\] '
behind = '\[Ōåō${count}\] '
staged = '\[!${count}\] '
modified = '\[+${count}\] '
untracked = '\[?${count}\] '
deleted = '\[-${count}\] '
renamed = '\[┬╗${count}\] '
conflicted = '\[=${count}\] '
stashed = '\[*${count}\] '
diverged = '\[Ōåæ${ahead_count}Ōåō${behind_count}\] '

[time]
disabled = false
time_format = "%I:%M %p" # 12-hour AM/PM format
style = "bg:time_bg fg:text_fg"
format = '[ $time ]($style)'

[character]
